<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>LinkedIn Cover — aitive Data</title>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@700&display=swap" rel="stylesheet">
  <style>
    body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f5f5f5; }
    canvas { border: 1px solid #ccc; margin: 20px; max-width: 90vw; height: auto; width: 1584px; }
    a { display: inline-block; margin-top: 10px; padding: 12px 32px; background: #D64B6A; color: white; text-decoration: none; border-radius: 6px; font-size: 16px; }
    a:hover { background: #b8405a; }
    p { color: #666; margin-top: 16px; font-size: 14px; }
  </style>
</head>
<body>
  <h2>LinkedIn Cover — 3168 x 792 px (4x Retina)</h2>
  <canvas id="canvas" width="3168" height="792"></canvas>
  <a id="download" download="aitivedata-linkedin-cover.png">Download PNG</a>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const S = 2; // 2x on top of 1584 = 3168
    ctx.scale(S, S);
    const W = 1584, H = 396;

    // === White background with subtle gradient ===
    ctx.fillStyle = '#FFFFFF';
    ctx.fillRect(0, 0, W, H);

    // Subtle warm gradient
    const surfGrad = ctx.createLinearGradient(0, 0, W, H);
    surfGrad.addColorStop(0, 'rgba(214,75,106,0.03)');
    surfGrad.addColorStop(0.5, 'rgba(255,255,255,0)');
    surfGrad.addColorStop(1, 'rgba(214,75,106,0.02)');
    ctx.fillStyle = surfGrad;
    ctx.fillRect(0, 0, W, H);

    // === Hexagon helper ===
    function drawHex(cx, cy, r, fillColor, strokeColor, strokeW, alpha) {
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const angle = (Math.PI / 3) * i - Math.PI / 6;
        const x = cx + r * Math.cos(angle);
        const y = cy + r * Math.sin(angle);
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.closePath();
      if (fillColor) { ctx.fillStyle = fillColor; ctx.fill(); }
      if (strokeColor) { ctx.strokeStyle = strokeColor; ctx.lineWidth = strokeW; ctx.stroke(); }
      ctx.restore();
    }

    // === Subtle faint hexagons - left side ===
    drawHex(110, 100, 45, 'rgba(214,75,106,0.05)', '#D64B6A', 1.2, 0.25);
    drawHex(160, 170, 32, 'rgba(214,75,106,0.03)', '#D64B6A', 0.8, 0.18);
    drawHex(75, 190, 25, 'rgba(214,75,106,0.02)', '#D64B6A', 0.7, 0.12);

    // === Main logo - right side (exact SVG polygons from logo-icon.svg) ===
    // Offset: place logo at right side, vertically centered
    // Original SVG: translate(15,0), viewBox 140x140, center around y=70
    // Scale ~2.5x, position at right
    const lx = 1250, ly = 198 - 140; // offset to center vertically in 396
    const ls = 1.8;
    function lp(x, y) { return [lx + (15 + x) * ls, ly + y * ls]; }

    // Polygon 1 - main hexagon
    function drawPoly(points, fillColor, strokeColor, strokeW, alpha) {
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.beginPath();
      ctx.moveTo(points[0][0], points[0][1]);
      for (let i = 1; i < points.length; i++) ctx.lineTo(points[i][0], points[i][1]);
      ctx.closePath();
      if (fillColor) { ctx.fillStyle = fillColor; ctx.fill(); }
      if (strokeColor) { ctx.strokeStyle = strokeColor; ctx.lineWidth = strokeW; ctx.stroke(); }
      ctx.restore();
    }

    drawPoly([lp(55,8), lp(85,25), lp(85,59), lp(55,76), lp(25,59), lp(25,25)],
      'rgba(214,75,106,0.18)', '#D64B6A', 2.5, 1.0);

    drawPoly([lp(90,30), lp(120,47), lp(120,81), lp(90,98), lp(60,81), lp(60,47)],
      'rgba(214,75,106,0.10)', '#D64B6A', 1.5, 0.5);

    drawPoly([lp(55,62), lp(85,79), lp(85,113), lp(55,130), lp(25,113), lp(25,79)],
      'rgba(214,75,106,0.06)', '#D64B6A', 1.5, 0.35);

    // Data point circles
    const cp = lp(55, 42);
    ctx.save();
    ctx.globalAlpha = 0.5;
    ctx.beginPath(); ctx.arc(cp[0], cp[1], 11 * ls, 0, Math.PI * 2);
    ctx.fillStyle = '#D64B6A'; ctx.fill();
    ctx.restore();
    ctx.save();
    ctx.globalAlpha = 0.9;
    ctx.beginPath(); ctx.arc(cp[0], cp[1], 5.5 * ls, 0, Math.PI * 2);
    ctx.fillStyle = '#D64B6A'; ctx.fill();
    ctx.restore();

    // === Faint scattered hexagons ===
    drawHex(400, 50, 20, 'rgba(214,75,106,0.03)', '#D64B6A', 0.7, 0.15);
    drawHex(540, 330, 16, 'rgba(214,75,106,0.02)', '#D64B6A', 0.5, 0.12);
    drawHex(1000, 40, 18, 'rgba(214,75,106,0.03)', '#D64B6A', 0.7, 0.15);
    drawHex(1150, 340, 14, 'rgba(214,75,106,0.02)', '#D64B6A', 0.5, 0.12);
    drawHex(750, 60, 13, 'rgba(214,75,106,0.02)', '#D64B6A', 0.4, 0.10);
    drawHex(870, 330, 11, 'rgba(214,75,106,0.02)', '#D64B6A', 0.4, 0.10);

    // === Subtle bottom border ===
    ctx.save();
    ctx.globalAlpha = 0.2;
    ctx.strokeStyle = '#D64B6A';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(0, H - 1);
    ctx.lineTo(W, H - 1);
    ctx.stroke();
    ctx.restore();

    // === Text - render via offscreen SVG for pixel-perfect sharpness ===
    function renderText() {
      const text = `<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}">
        <defs>
          <style>@import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@700&amp;display=swap');</style>
        </defs>
        <text x="${W/2}" y="${H * 0.42}" text-anchor="middle" dominant-baseline="middle"
              font-family="'Libre Baskerville', Georgia, serif" font-weight="700" font-size="34">
          <tspan fill="#AAAAAA">// </tspan><tspan fill="#1E1E23">Data  ·  AI  ·  IT Solutions</tspan>
        </text>
      </svg>`;

      const img = new Image();
      const blob = new Blob([text], { type: 'image/svg+xml;charset=utf-8' });
      const url = URL.createObjectURL(blob);

      img.onload = function() {
        ctx.drawImage(img, 0, 0, W, H);
        URL.revokeObjectURL(url);
        const pngUrl = canvas.toDataURL('image/png');
        document.getElementById('download').href = pngUrl;
      };
      img.src = url;
    }

    // Wait for font to fully load, then render
    const fontFace = new FontFace('Libre Baskerville', 'url(https://fonts.gstatic.com/s/librebaskerville/v16/kmKnZrc3Hgbbcjq75U4uslyuy4kqwN3YpSzBOQ.woff2)', { weight: '700' });
    fontFace.load().then(function(loaded) {
      document.fonts.add(loaded);
      renderText();
    }).catch(function() {
      // Fallback: wait and try anyway
      setTimeout(renderText, 2000);
    });
  </script>
</body>
</html>

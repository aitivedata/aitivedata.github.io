<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.page_title %}{{ page.page_title }} – {{ site.title }}{% else %}{{ site.title }} – {{ site.description }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="{{ '/assets/favicon.svg' | relative_url }}">

  <!-- Open Graph / Social -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="{% if page.page_title %}{{ page.page_title }} – {{ site.title }}{% else %}{{ site.title }}{% endif %}">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <meta property="og:url" content="{{ site.url }}{{ page.url }}">
  <meta property="og:site_name" content="{{ site.title }}">
  <meta property="og:image" content="{{ site.url }}/assets/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{% if page.page_title %}{{ page.page_title }} – {{ site.title }}{% else %}{{ site.title }}{% endif %}">
  <meta name="twitter:description" content="{{ page.description | default: site.description }}">

  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <script src="{{ '/assets/js/cookie-consent.js' | relative_url }}"></script>
</head>
<body>

  <a href="#main-content" class="skip-link">Skip to content</a>

  {% include header.html %}

  <main class="main" id="main-content">
    <div class="container">
      {{ content }}
    </div>
  </main>

  {% include footer.html %}

<script>
(function(){var r=document.querySelectorAll('.reveal');if(!r.length)return;var o=new IntersectionObserver(function(e){e.forEach(function(en){if(en.isIntersecting){en.target.classList.add('visible');o.unobserve(en.target)}})},{threshold:0.15,rootMargin:'0px 0px -50px 0px'});r.forEach(function(el){o.observe(el)})})();
</script>
</body>
</html>

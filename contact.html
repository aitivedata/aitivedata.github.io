---
layout: default
page_title: Contact
description: "Get in touch with Aitive Data. We'd love to hear about your project."
---

<div class="page-header">
  <h1>Get in <span>Touch</span></h1>
  <p class="page-subtitle">// We'd love to hear about your project</p>
</div>

<div class="content-block">
  <h2>Send us a Message</h2>
  <form class="contact-form" action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
    <div class="form-group">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" placeholder="Your name" required>
    </div>
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="your@email.com" required>
    </div>
    <div class="form-group">
      <label for="subject">Subject</label>
      <input type="text" id="subject" name="subject" placeholder="What is this about?">
    </div>
    <div class="form-group">
      <label for="message">Message</label>
      <textarea id="message" name="message" placeholder="Tell us about your project or inquiry..." required></textarea>
    </div>
    <button type="submit" class="btn">Send Message</button>
  </form>
</div>
